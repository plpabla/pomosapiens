name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      # Data-mutating suites run against an ephemeral local Supabase, never prod.
      - name: Start local Supabase
        run: npx supabase start
      - name: Export local Supabase credentials
        run: |
          status=$(npx supabase status -o json)
          {
            echo "SUPABASE_URL=$(echo "$status" | jq -r '.API_URL')"
            echo "SUPABASE_KEY=$(echo "$status" | jq -r '.ANON_KEY')"
            echo "SUPABASE_SERVICE_ROLE_KEY=$(echo "$status" | jq -r '.SERVICE_ROLE_KEY')"
          } >> "$GITHUB_ENV"
      - name: Write .dev.vars for workers test pool
        run: |
          printf 'SUPABASE_URL=%s\nSUPABASE_KEY=%s\nSUPABASE_SERVICE_ROLE_KEY=%s\n' "$SUPABASE_URL" "$SUPABASE_KEY" "$SUPABASE_SERVICE_ROLE_KEY" > .dev.vars
      - name: Run unit tests (retry up to 3x)
        run: |
          for attempt in 1 2 3; do
            echo "::group::Unit test attempt $attempt of 3"
            if npm test; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt failed"
          done
          echo "Unit tests failed after 3 attempts"
          exit 1

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      # Data-mutating suites run against an ephemeral local Supabase, never prod.
      - name: Start local Supabase
        run: npx supabase start
      - name: Export local Supabase credentials
        run: |
          status=$(npx supabase status -o json)
          {
            echo "SUPABASE_URL=$(echo "$status" | jq -r '.API_URL')"
            echo "SUPABASE_KEY=$(echo "$status" | jq -r '.ANON_KEY')"
            echo "SUPABASE_SERVICE_ROLE_KEY=$(echo "$status" | jq -r '.SERVICE_ROLE_KEY')"
          } >> "$GITHUB_ENV"
      - name: Write .dev.vars for e2e
        run: |
          printf 'SUPABASE_URL=%s\nSUPABASE_KEY=%s\nSUPABASE_SERVICE_ROLE_KEY=%s\n' "$SUPABASE_URL" "$SUPABASE_KEY" "$SUPABASE_SERVICE_ROLE_KEY" > .dev.vars
      - name: Run e2e tests
        run: npm run test:e2e
        env:
          CI: "true"
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
